name: Desktop Builds

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: vetera-macos
            bundle_path: src-tauri/target/release/bundle
          - os: windows-latest
            artifact_name: vetera-windows
            bundle_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          - os: ubuntu-22.04
            artifact_name: vetera-linux
            bundle_path: src-tauri/target/release/bundle

    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect Apple signing availability
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$KEYCHAIN_PASSWORD" ]; then
            echo "APPLE_SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "::notice::Apple signing secrets missing; continuing with unsigned macOS build."
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.APPLE_SIGNING_AVAILABLE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          IDENTITY=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\\(Developer ID Application:.*\\)"/\\1/p' | head -n 1)
          if [ -z "$IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found in imported certificate."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        if: runner.os != 'Windows'
        run: npm run tauri:build

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.bundle_path }}/**/*.dmg
            ${{ matrix.bundle_path }}/**/*.app.tar.gz
            ${{ matrix.bundle_path }}/**/*.sig
            ${{ matrix.bundle_path }}/**/*.appimage
            ${{ matrix.bundle_path }}/**/*.deb
            ${{ matrix.bundle_path }}/**/*.rpm
            ${{ matrix.bundle_path }}/**/*.msi
            ${{ matrix.bundle_path }}/**/*.exe
          if-no-files-found: warn

      - name: Cleanup Apple keychain
        if: runner.os == 'macOS' && env.APPLE_SIGNING_AVAILABLE == 'true' && always()
        shell: bash
        run: |
          security delete-keychain build.keychain || true
          rm -f certificate.p12

  release:
    runs-on: ubuntu-22.04
    needs: build
    if: github.ref_name == 'master' || github.ref_name == 'main'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Vetera Nightly
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.app.tar.gz
            release-assets/**/*.sig
            release-assets/**/*.AppImage
            release-assets/**/*.appimage
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.msi
            release-assets/**/*.exe
