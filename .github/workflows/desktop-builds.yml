name: Desktop Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: vetera-macos
            bundle_path: src-tauri/target/release/bundle
          - os: windows-latest
            artifact_name: vetera-windows
            bundle_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          - os: ubuntu-22.04
            artifact_name: vetera-linux
            bundle_path: src-tauri/target/release/bundle

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        if: runner.os != 'Windows'
        run: npm run tauri:build

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.bundle_path }}/**/*.dmg
            ${{ matrix.bundle_path }}/**/*.app.tar.gz
            ${{ matrix.bundle_path }}/**/*.appimage
            ${{ matrix.bundle_path }}/**/*.deb
            ${{ matrix.bundle_path }}/**/*.rpm
            ${{ matrix.bundle_path }}/**/*.msi
            ${{ matrix.bundle_path }}/**/*.exe
          if-no-files-found: warn
