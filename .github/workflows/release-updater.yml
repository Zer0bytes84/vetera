name: Versioned Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: vetera-macos-release
            bundle_path: src-tauri/target/release/bundle
          - os: windows-latest
            artifact_name: vetera-windows-release
            bundle_path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle
          - os: ubuntu-22.04
            artifact_name: vetera-linux-release
            bundle_path: src-tauri/target/release/bundle

    runs-on: ${{ matrix.os }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate tag version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match src-tauri/tauri.conf.json ($APP_VERSION)."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect Apple signing availability
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ] && [ -n "$KEYCHAIN_PASSWORD" ]; then
            echo "APPLE_SIGNING_AVAILABLE=true" >> "$GITHUB_ENV"
          else
            echo "APPLE_SIGNING_AVAILABLE=false" >> "$GITHUB_ENV"
            echo "::notice::Apple signing secrets missing; continuing with unsigned macOS release build."
          fi

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.APPLE_SIGNING_AVAILABLE == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          IDENTITY=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\\(Developer ID Application:.*\\)"/\\1/p' | head -n 1)
          if [ -z "$IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found in imported certificate."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        if: runner.os != 'Windows'
        run: npm run tauri:build

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload release bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.bundle_path }}/**/*.dmg
            ${{ matrix.bundle_path }}/**/*.app.tar.gz
            ${{ matrix.bundle_path }}/**/*.AppImage.tar.gz
            ${{ matrix.bundle_path }}/**/*.appimage
            ${{ matrix.bundle_path }}/**/*.deb
            ${{ matrix.bundle_path }}/**/*.rpm
            ${{ matrix.bundle_path }}/**/*.msi
            ${{ matrix.bundle_path }}/**/*.exe
            ${{ matrix.bundle_path }}/**/*.zip
            ${{ matrix.bundle_path }}/**/*.sig
          if-no-files-found: error

      - name: Cleanup Apple keychain
        if: runner.os == 'macOS' && env.APPLE_SIGNING_AVAILABLE == 'true' && always()
        shell: bash
        run: |
          security delete-keychain build.keychain || true
          rm -f certificate.p12

  release:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Generate latest.json
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path("release-assets")
          tag_name = os.environ["TAG_NAME"]
          version = tag_name[1:] if tag_name.startswith("v") else tag_name
          repository = os.environ["REPOSITORY"]

          def pick(patterns):
              for pattern in patterns:
                  matches = sorted(root.rglob(pattern))
                  if matches:
                      return matches[0]
              raise SystemExit(f"No artifact found for patterns: {patterns}")

          selections = {
              "darwin-aarch64": ["*.app.tar.gz"],
              "windows-x86_64": ["*-setup.exe", "*.msi"],
              "linux-x86_64": ["*.AppImage", "*.deb"],
          }

          platforms = {}
          for target, patterns in selections.items():
              asset = pick(patterns)
              signature = Path(f"{asset}.sig")
              if not signature.exists():
                  raise SystemExit(f"Missing signature for {asset}")

              platforms[target] = {
                  "signature": signature.read_text().strip(),
                  "url": f"https://github.com/{repository}/releases/download/{tag_name}/{asset.name}",
              }

          payload = {
              "version": version,
              "notes": f"Vetera {version}",
              "pub_date": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }

          Path("latest.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mapfile -t files < <(find release-assets -type f | sort)

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" latest.json "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" latest.json "${files[@]}" \
              --verify-tag \
              --title "Vetera $VERSION" \
              --notes "Release Vetera $VERSION"
          fi
