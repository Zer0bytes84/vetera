<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dashboard - bAItari</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            dark: {
              bg: '#0a0a0a',
              card: '#141414',
              border: '#1f1f1f',
              text: '#e5e5e5',
              muted: '#666',
            },
            light: {
              bg: '#fafafa',
              card: '#ffffff',
              border: '#e5e5e5',
              text: '#0a0a0a',
              muted: '#888',
            },
            accent: {
              green: '#22c55e',
              orange: '#f97316',
              blue: '#3b82f6',
              violet: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    
    /* Smooth transitions */
    .transition-all { transition: all 0.3s ease; }
    
    /* Card hover effect */
    .card-hover {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    
    /* Line chart animation */
    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }
    
    /* Dark mode specific */
    .dark ::-webkit-scrollbar-thumb { background: #444; }
    .dark .card-hover:hover {
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body class="bg-light-bg text-light-text dark:bg-dark-bg dark:text-dark-text">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Theme Toggle Component
    const ThemeToggle = ({ isDark, toggle }) => (
      <button
        onClick={toggle}
        className="fixed top-6 right-6 z-50 w-12 h-12 rounded-full bg-light-card dark:bg-dark-card border border-light-border dark:border-dark-border shadow-lg flex items-center justify-center transition-all hover:scale-105"
      >
        {isDark ? (
          <svg className="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <path stroke="currentColor" strokeWidth="2" d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        ) : (
          <svg className="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
          </svg>
        )}
      </button>
    );

    // Header Component
    const Header = () => (
      <div className="flex items-center justify-between mb-8">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center text-white font-bold text-lg shadow-lg">
            bA
          </div>
          <div>
            <h1 className="text-xl font-bold tracking-tight">bAItari</h1>
            <p className="text-xs text-light-muted dark:text-dark-muted">Portfolio Dashboard</p>
          </div>
        </div>
        <div className="flex items-center gap-6">
          <nav className="hidden md:flex items-center gap-6 text-sm">
            <a href="#" className="text-light-muted dark:text-dark-muted hover:text-accent-green transition-colors">Dashboard</a>
            <a href="#" className="text-light-muted dark:text-dark-muted hover:text-accent-green transition-colors">Markets</a>
            <a href="#" className="text-accent-green font-medium">Portfolio</a>
            <a href="#" className="text-light-muted dark:text-dark-muted hover:text-accent-green transition-colors">Watchlist</a>
          </nav>
          <div className="flex items-center gap-3">
            <div className="text-right hidden sm:block">
              <p className="text-xs text-light-muted dark:text-dark-muted">Value</p>
              <p className="text-sm font-semibold">150K-180K DA</p>
            </div>
            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-violet-500 to-violet-600 flex items-center justify-center text-white text-sm font-medium shadow-lg">
              Z
            </div>
          </div>
        </div>
      </div>
    );

    // Main Value Display
    const MainValue = () => (
      <div className="mb-8">
        <div className="flex items-baseline gap-4 mb-2">
          <h2 className="text-5xl font-bold tracking-tight">150,000</h2>
          <span className="text-2xl text-light-muted dark:text-dark-muted">DA</span>
        </div>
        <div className="flex items-center gap-2 text-sm">
          <span className="text-light-muted dark:text-dark-muted">Current Value</span>
          <span className="flex items-center gap-1 text-accent-green font-medium">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
            </svg>
            12.45%
          </span>
        </div>
      </div>
    );

    // Line Chart Component
    const LineChart = () => {
      const data = useMemo(() => {
        // Generate smooth curve data
        const points = [];
        const values = [45, 52, 48, 58, 55, 68, 72, 65, 78, 85, 82, 90, 95, 88, 92, 98, 105, 102, 108, 115, 110, 118, 125, 120];
        const width = 800;
        const height = 120;
        const padding = { top: 10, bottom: 20 };
        
        const max = Math.max(...values);
        const min = Math.min(...values);
        const range = max - min;
        
        values.forEach((val, i) => {
          const x = (i / (values.length - 1)) * width;
          const y = height - padding.bottom - ((val - min) / range) * (height - padding.top - padding.bottom);
          points.push({ x, y, val });
        });
        
        return points;
      }, []);

      const pathD = useMemo(() => {
        if (points.length === 0) return '';
        let d = `M ${points[0].x} ${points[0].y}`;
        for (let i = 1; i < points.length; i++) {
          const prev = points[i - 1];
          const curr = points[i];
          const cpX = (prev.x + curr.x) / 2;
          d += ` C ${cpX} ${prev.y}, ${cpX} ${curr.y}, ${curr.x} ${curr.y}`;
        }
        return d;
      }, [points]);

      const areaD = useMemo(() => {
        if (points.length === 0) return '';
        const height = 120;
        let d = pathD + ` L ${points[points.length - 1].x} ${height} L ${points[0].x} ${height} Z`;
        return d;
      }, [pathD, points]);

      return (
        <div className="mb-8">
          <div className="h-32 relative">
            <svg className="w-full h-full" viewBox="0 0 800 120" preserveAspectRatio="none">
              {/* Gradient area */}
              <defs>
                <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stopColor="#22c55e" stopOpacity="0.2"/>
                  <stop offset="100%" stopColor="#22c55e" stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d={areaD} fill="url(#areaGradient)" />
              <path 
                d={pathD} 
                fill="none" 
                stroke="#22c55e" 
                strokeWidth="2"
                strokeLinecap="round"
              />
              {/* Current point */}
              <circle cx={points[points.length - 1]?.x} cy={points[points.length - 1]?.y} r="4" fill="#22c55e" />
            </svg>
          </div>
          <div className="flex items-center justify-between text-xs text-light-muted dark:text-dark-muted mt-2">
            <span>Current Value</span>
            <div className="flex items-center gap-4">
              {['1M', '6M', '1Y', '3Y', 'All'].map((period) => (
                <button 
                  key={period}
                  className={`px-3 py-1 rounded-full transition-colors ${
                    period === 'All' 
                      ? 'bg-light-border dark:bg-dark-border text-light-text dark:text-dark-text' 
                      : 'hover:text-accent-green'
                  }`}
                >
                  {period}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // KPI Cards
    const KPICards = () => {
      const kpis = [
        { label: 'Companies', value: '12', subtext: 'Actives' },
        { label: 'Cash Balance', value: '8,000', subtext: 'DA disponible' },
        { label: 'Committed Cash', value: '5,000', subtext: 'En attente' },
      ];

      return (
        <div className="grid grid-cols-3 gap-4 mb-8">
          {kpis.map((kpi) => (
            <div key={kpi.label} className="bg-light-card dark:bg-dark-card rounded-2xl p-4 border border-light-border dark:border-dark-border card-hover">
              <p className="text-2xl font-bold mb-1">{kpi.value}</p>
              <p className="text-xs text-light-muted dark:text-dark-muted">{kpi.label}</p>
              <p className="text-[10px] text-accent-green mt-1">{kpi.subtext}</p>
            </div>
          ))}
        </div>
      );
    };

    // Asset Card
    const AssetCard = ({ name, value, change, changeType, icon, color, invested, series }) => (
      <div className="bg-light-card dark:bg-dark-card rounded-2xl p-5 border border-light-border dark:border-dark-border card-hover min-w-[280px]">
        <div className="flex items-start justify-between mb-4">
          <div className="flex items-center gap-3">
            <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white text-xl shadow-lg`} style={{ background: color }}>
              {icon}
            </div>
            <div>
              <h3 className="font-semibold">{name}</h3>
              <p className="text-xs text-light-muted dark:text-dark-muted">{invested}</p>
            </div>
          </div>
          <div className={`flex items-center gap-1 text-xs font-medium ${changeType === 'positive' ? 'text-accent-green' : 'text-red-500'}`}>
            {changeType === 'positive' ? '+' : '-'}{change}%
            <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={changeType === 'positive' ? "M5 10l7-7m0 0l7 7m-7-7v18" : "M19 14l-7 7m0 0l-7-7m7 7V3"}/>
            </svg>
          </div>
        </div>
        <div className="flex items-center justify-between">
          <div>
            <p className="text-lg font-bold">{value} DA</p>
            <p className="text-xs text-light-muted dark:text-dark-muted">{series}</p>
          </div>
          <button className="px-4 py-2 bg-light-bg dark:bg-dark-bg hover:bg-accent-green hover:text-white text-xs font-medium rounded-lg transition-all border border-light-border dark:border-dark-border">
            Détails
          </button>
        </div>
      </div>
    );

    // Popular Assets Section
    const PopularAssets = () => {
      const assets = [
        { name: 'Airtable', value: '45,000', change: '156', changeType: 'positive', icon: 'At', color: 'linear-gradient(135deg, #18B4A7 0%, #0D9488 100%)', invested: 'Investi 30K', series: 'SaaS · Croissance' },
        { name: 'Stripe', value: '38,000', change: '89', changeType: 'positive', icon: 'St', color: 'linear-gradient(135deg, #635BFF 0%, #4F46E5 100%)', invested: 'Investi 25K', series: 'Fintech · Série D' },
        { name: 'Rippling', value: '28,000', change: '45', changeType: 'positive', icon: 'Rp', color: 'linear-gradient(135deg, #F59E0B 0%, #D97706 100%)', invested: 'Investi 20K', series: 'HR Tech · Série C' },
      ];

      return (
        <div className="mb-8">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold">Actifs Populaires</h3>
            <div className="flex items-center gap-2">
              <button className="p-2 rounded-lg bg-light-card dark:bg-dark-card border border-light-border dark:border-dark-border hover:border-accent-green transition-colors">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/>
                </svg>
              </button>
              <button className="p-2 rounded-lg bg-light-card dark:bg-dark-card border border-light-border dark:border-dark-border hover:border-accent-green transition-colors">
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/>
                </svg>
              </button>
            </div>
          </div>
          <div className="flex gap-4 overflow-x-auto pb-2" style={{ scrollbarWidth: 'none', msOverflowStyle: 'none' }}>
            {assets.map((asset) => (
              <AssetCard key={asset.name} {...asset} />
            ))}
          </div>
        </div>
      );
    };

    // Holding Item
    const HoldingItem = ({ name, units, value, change, changeType, status, icon, color }) => (
      <div className="flex items-center justify-between p-4 bg-light-card dark:bg-dark-card rounded-xl border border-light-border dark:border-dark-border card-hover">
        <div className="flex items-center gap-3">
          <div className="w-10 h-10 rounded-lg flex items-center justify-center text-white text-sm font-bold" style={{ background: color }}>
            {icon}
          </div>
          <div>
            <h4 className="font-medium text-sm">{name}</h4>
            <p className="text-xs text-light-muted dark:text-dark-muted">{units}</p>
          </div>
        </div>
        <div className="text-right">
          <p className="font-semibold text-sm">{value} DA</p>
          <p className={`text-xs ${changeType === 'positive' ? 'text-accent-green' : 'text-red-500'}`}>
            {changeType === 'positive' ? '+' : '-'}{change}%
          </p>
        </div>
        {status && (
          <div className="px-3 py-1 rounded-full bg-yellow-500/10 border border-yellow-500/20">
            <p className="text-xs text-yellow-500 font-medium">{status}</p>
          </div>
        )}
      </div>
    );

    // Holdings List
    const Holdings = () => {
      const holdings = [
        { name: 'Anthropic', units: '100 Units', value: '50,000', change: '12.45', changeType: 'positive', status: 'Pending', icon: 'An', color: '#1a1a1a' },
        { name: 'OpenSea', units: '200 Units', value: '25,000', change: '8.32', changeType: 'positive', status: 'Pending', icon: 'OS', color: '#2081E2' },
        { name: 'OpenAI', units: '50 Units', value: '30,000', change: '15.67', changeType: 'positive', status: null, icon: 'OA', color: '#10A37F' },
      ];

      return (
        <div className="mb-8">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold">Mes Participations</h3>
            <a href="#" className="text-xs text-accent-green hover:underline">Voir tout</a>
          </div>
          <div className="space-y-3">
            {holdings.map((holding) => (
              <HoldingItem key={holding.name} {...holding} />
            ))}
          </div>
        </div>
      );
    };

    // Watchlist Item
    const WatchlistItem = ({ name, category, icon, color }) => (
      <div className="flex items-center justify-between p-3 bg-light-card dark:bg-dark-card rounded-xl border border-light-border dark:border-dark-border hover:border-accent-green/30 transition-colors">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold" style={{ background: color }}>
            {icon}
          </div>
          <div>
            <h4 className="font-medium text-sm">{name}</h4>
            <p className="text-xs text-light-muted dark:text-dark-muted">{category}</p>
          </div>
        </div>
        <button className="px-3 py-1.5 bg-accent-green text-white text-xs font-medium rounded-lg hover:bg-emerald-600 transition-colors">
          Investir
        </button>
      </div>
    );

    // Watchlist
    const Watchlist = () => {
      const items = [
        { name: 'Perplexity', category: 'AI Search', icon: 'Px', color: '#6366F1' },
        { name: 'Waymo', category: 'Autonomous', icon: 'Wm', color: '#3B82F6' },
        { name: 'Ramp', category: 'Fintech', icon: 'Rp', color: '#22C55E' },
      ];

      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold">Liste de surveillance</h3>
            <a href="#" className="text-xs text-accent-green hover:underline">Voir tout</a>
          </div>
          <div className="space-y-2">
            {items.map((item) => (
              <WatchlistItem key={item.name} {...item} />
            ))}
          </div>
        </div>
      );
    };

    // Main Dashboard
    const Dashboard = () => {
      const [isDark, setIsDark] = useState(false);

      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [isDark]);

      return (
        <div className="min-h-screen p-6 md:p-10 max-w-7xl mx-auto">
          <ThemeToggle isDark={isDark} toggle={() => setIsDark(!isDark)} />
          
          <Header />
          
          <div className="grid lg:grid-cols-3 gap-8">
            {/* Left column - Main content */}
            <div className="lg:col-span-2 space-y-6">
              <MainValue />
              <LineChart />
              <KPICards />
              <PopularAssets />
              
              <div className="grid md:grid-cols-2 gap-6">
                <Holdings />
                <Watchlist />
              </div>
            </div>
            
            {/* Right column - Quick stats or additional widgets */}
            <div className="space-y-6">
              {/* Recent Activity */}
              <div className="bg-light-card dark:bg-dark-card rounded-2xl p-5 border border-light-border dark:border-dark-border">
                <h3 className="font-semibold mb-4">Activité récente</h3>
                <div className="space-y-3">
                  {[
                    { action: 'Investissement', target: 'Airtable', amount: '+30,000 DA', time: '2h ago', type: 'positive' },
                    { action: 'Vente', target: 'Stripe', amount: '-15,000 DA', time: '5h ago', type: 'negative' },
                    { action: 'Dividende', target: 'Rippling', amount: '+2,500 DA', time: '1j ago', type: 'positive' },
                  ].map((activity, i) => (
                    <div key={i} className="flex items-center justify-between text-sm">
                      <div>
                        <p className="font-medium">{activity.action} <span className="text-light-muted dark:text-dark-muted">{activity.target}</span></p>
                        <p className="text-xs text-light-muted dark:text-dark-muted">{activity.time}</p>
                      </div>
                      <span className={activity.type === 'positive' ? 'text-accent-green' : 'text-red-500'}>
                        {activity.amount}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
              
              {/* Market Overview */}
              <div className="bg-light-card dark:bg-dark-card rounded-2xl p-5 border border-light-border dark:border-dark-border">
                <h3 className="font-semibold mb-4">Marché</h3>
                <div className="space-y-3">
                  {[
                    { name: 'Tech', change: '+2.4%', positive: true },
                    { name: 'Santé', change: '+1.8%', positive: true },
                    { name: 'Finance', change: '-0.5%', positive: false },
                    { name: 'Énergie', change: '+3.2%', positive: true },
                  ].map((market) => (
                    <div key={market.name} className="flex items-center justify-between">
                      <span className="text-sm">{market.name}</span>
                      <span className={`text-sm font-medium ${market.positive ? 'text-accent-green' : 'text-red-500'}`}>
                        {market.change}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
