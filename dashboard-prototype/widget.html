<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>bAItari Widget</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0a0a0a;color:#e5e5e5;padding:40px}.widget{background:#111;border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:20px;height:380px;display:flex;flex-direction:column}.label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);margin-bottom:4px}.value{font-size:28px;font-weight:600;letter-spacing:-0.03em;color:#e5e5e5}.delta-badge{display:flex;align-items:center;gap:4px;background:rgba(16,185,129,0.1);border-radius:999px;padding:2px 8px}.delta{font-size:11px;font-weight:600;color:#10b981}.bars{display:flex;align-items:flex-end;gap:5px;height:120px;margin-top:16px}.bar{width:100%;border-radius:999px;background:rgba(255,255,255,0.08)}.bar.active{background:#10b981}.bar-label{font-size:7px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:4px}.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08)}.kpi-label{font-size:9px;color:rgba(255,255,255,0.4)}.kpi-value{font-size:13px;font-weight:600}</style></head><body><div class="widget"><div class="label">Encaissements</div><div style="display:flex;align-items:baseline;gap:10px;margin-bottom:2px"><div class="value">1 024 000 DA</div><div class="delta-badge"><span class="delta">+12.5%</span></div></div><div style="font-size:10px;color:rgba(255,255,255,0.3)">Total annuel</div><div class="bars"><div class="bar-wrapper" style="flex:1"><div class="bar" style="height:40%"></div><div class="bar-label">JAN</div></div><div class="bar-wrapper" style="flex:1"><div class="bar" style="height:55%"></div><div class="bar-label">FÉV</div></div><div class="bar-wrapper" style="flex:1"><div class="bar" style="height:70%"></div><div class="bar-label">MAR</div></div><div class="bar-wrapper" style
