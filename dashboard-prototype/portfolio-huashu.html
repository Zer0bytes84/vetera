<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bAItari Portfolio Widget — Huashu Design</title>
  
  <!-- 
    ===========================================
    HUASHU DESIGN — Portfolio Widget
    ===========================================
    
    PRINCIPLE: One widget, 120% detail execution
    - Double border system (matches existing dashboard widgets)
    - Dark-first design (#0a0a0a), light mode as variant
    - Typography: Inter with tight tracking for numbers
    - The "crème de la crème" moment: Animated line chart with glow dot
    
    INTEGRATION: Fits alongside Encaissements/Rendez-vous/Tâches widgets
    - Same card radius: 24px
    - Same double border technique
    - Same hover physics: -translate-y-0.5 + shadow lift
    ===========================================
  -->
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] },
          colors: {
            // shadcn/ui compatible colors (same as dashboard widgets)
            border: '#262626',
            background: '#0a0a0a',
            foreground: '#fafafa',
            card: '#141414',
            'card-foreground': '#fafafa',
            muted: '#262626',
            'muted-foreground': '#a1a1aa',
            accent: { DEFAULT: '#22c55e', foreground: '#fafafa' },
            // Light mode overrides
            'border-light': '#e5e5e5',
            'background-light': '#ffffff',
            'card-light': '#ffffff',
          }
        }
      }
    }
  </script>
  
  <style>
    /* === BASE (shadcn/ui compatible) === */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    html:not(.dark) body { background: #ffffff; color: #0a0a0a; }
    
    /* === WIDGET CONTAINER === */
    .widget-container { width: 100%; max-width: 400px; }
    
    /* === DOUBLE BORDER CARD (same as Encaissements/Rendez-vous/Tâches widgets) === */
    .widget-card {
      position: relative;
      border-radius: 28px;
      background: #141414;
      border: 1px solid #262626;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.5);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    html:not(.dark) .widget-card {
      background: #ffffff;
      border-color: #e5e5e5;
      box-shadow: 0 20px 60px -20px rgba(0,0,0,0.1);
    }
    
    /* Hover physics — identical to other widgets */
    .widget-card:hover {
      transform: translateY(-0.5px);
      box-shadow: 0 25px 70px -20px rgba(0,0,0,0.4);
      border-color: #404040;
    }
    html:not(.dark) .widget-card:hover {
      box-shadow: 0 25px 70px -20px rgba(0,0,0,0.08);
      border-color: #d0d0d0;
    }
    
    .widget-inner {
      padding: 24px;
      border-radius: 27px;
      border: 1px solid #1f1f1f;
      background: #141414;
    }
    html:not(.dark) .widget-inner {
      background: #ffffff;
      border-color: #f0f0f0;
    }
    
    /* === TYPOGRAPHY (same as other widgets) === */
    /* text-[11px] text-muted-foreground pattern */
    .widget-label {
      font-size: 11px;
      line-height: 1.4;
      color: #a1a1aa;
      font-weight: 400;
    }
    html:not(.dark) .widget-label { color: #71717a; }
    
    /* text-[10px] text-muted-foreground/50 pattern */
    .widget-sublabel {
      font-size: 10px;
      color: rgba(161,161,170,0.5);
    }
    html:not(.dark) .widget-sublabel { color: rgba(113,113,122,0.5); }
    
    /* Large numbers — text-[28px] font-semibold tracking-[-0.03em] */
    .hero-value {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
      line-height: 1.1;
      margin: 4px 0;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    
    .hero-currency {
      font-size: 18px;
      font-weight: 400;
      color: #a1a1aa;
      letter-spacing: normal;
    }
    html:not(.dark) .hero-currency { color: #71717a; }
    
    /* === HEADER (same pattern as other widgets) === */
    .widget-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .brand-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* w-10 h-10 rounded-xl bg-gradient-to-br pattern */
    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 15px -3px rgba(34,197,94,0.3);
    }
    
    /* more-btn pattern */
    .more-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid #262626;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    html:not(.dark) .more-btn { border-color: #e5e5e5; color: #71717a; }
    
    .more-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: #404040;
      color: #fafafa;
    }
    html:not(.dark) .more-btn:hover { background: rgba(0,0,0,0.05); color: #18181b; }
    
    /* === DELTA BADGE === */
    .delta-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #22c55e;
      font-size: 13px;
      font-weight: 500;
    }
    
    .delta-badge svg {
      width: 14px;
      height: 14px;
    }
    
    /* === LINE CHART === */
    .chart-container {
      position: relative;
      height: 80px;
      margin: 16px 0;
    }
    
    .chart-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    
    .chart-area {
      fill: url(#areaGradient);
    }
    
    .chart-line {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 4px rgba(34,197,94,0.3));
    }
    
    .chart-dot {
      fill: #22c55e;
      filter: drop-shadow(0 0 8px rgba(34,197,94,0.6));
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { r: 3; opacity: 1; }
      50% { r: 4; opacity: 0.8; }
    }
    
    /* === ASSET ROWS (compact list) === */
    .assets-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #1f1f1f;
    }
    html:not(.dark) .assets-section { border-top-color: #f0f0f0; }
    
    .asset-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }
    
    .asset-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* Small icon pills */
    .asset-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
    }
    
    .asset-icon.green { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    .asset-icon.purple { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
    .asset-icon.orange { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    
    .asset-details h4 {
      font-size: 13px;
      font-weight: 500;
      color: #fafafa;
      margin-bottom: 1px;
    }
    html:not(.dark) .asset-details h4 { color: #18181b; }
    
    .asset-details p {
      font-size: 11px;
      color: #a1a1aa;
    }
    html:not(.dark) .asset-details p { color: #71717a; }
    
    .asset-value {
      text-align: right;
    }
    
    .asset-value .amount {
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #fafafa;
    }
    html:not(.dark) .asset-value .amount { color: #18181b; }
    
    .asset-value .change {
      font-size: 11px;
      color: #22c55e;
      font-weight: 500;
    }
    
    /* === QUICK STATS (text-[9px] pattern) === */
    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #1f1f1f;
    }
    html:not(.dark) .stats-row { border-top-color: #f0f0f0; }
    
    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #52525b;
      margin-bottom: 2px;
    }
    html:not(.dark) .stat-label { color: #a1a1aa; }
    
    .stat-value {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #fafafa;
    }
    html:not(.dark) .stat-value { color: #18181b; }
    
    /* === THEME TOGGLE === */
    .theme-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #141414;
      border: 1px solid #262626;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px -4px rgba(0,0,0,0.3);
      z-index: 100;
    }
    html:not(.dark) .theme-toggle {
      background: #ffffff;
      border-color: #e5e5e5;
      color: #18181b;
    }
    
    .theme-toggle:hover {
      transform: scale(1.05);
      border-color: #404040;
    }
    html:not(.dark) .theme-toggle:hover { border-color: #d0d0d0; }
  </style>
</head>
<body>
  
  <div class="widget-container">
    <!-- Widget with double border -->
    <div class="widget-card">
      <div class="widget-inner">
        
        <!-- Header (same pattern as other widgets) -->
        <div class="widget-header">
          <div class="brand-section">
            <div class="brand-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
            </div>
            <div>
              <p class="widget-label">Portfolio</p>
              <p class="widget-sublabel">Investissements actifs</p>
            </div>
          </div>
          <button class="more-btn" aria-label="More options">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="2"/>
              <circle cx="12" cy="12" r="2"/>
              <circle cx="12" cy="19" r="2"/>
            </svg>
          </button>
        </div>
        
        <!-- Hero Value (same typography pattern) -->
        <div>
          <div class="hero-value">
            150,000
            <span class="hero-currency">DA</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
            <span class="widget-label">Current Value</span>
            <span class="delta-badge">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
              </svg>
              12.45%
            </span>
          </div>
        </div>
        
        <!-- Line Chart -->
        <div class="chart-container">
          <svg class="chart-svg" viewBox="0 0 460 100" preserveAspectRatio="none">
            <defs>
              <linearGradient id="areaGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#22c55e" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <!-- Area -->
            <path class="chart-area" d="M0,85 C40,80 80,82 120,70 C160,58 200,60 240,45 C280,30 320,32 360,22 C400,12 430,15 460,10 L460,100 L0,100 Z"/>
            <!-- Line -->
            <path class="chart-line" d="M0,85 C40,80 80,82 120,70 C160,58 200,60 240,45 C280,30 320,32 360,22 C400,12 430,15 460,10"/>
            <!-- Animated glow dot -->
            <circle class="chart-dot" cx="460" cy="10"/>
          </svg>
        </div>
        
        <!-- Assets List -->
        <div class="assets-section">
          <p class="widget-label" style="margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em;">Top Holdings</p>
          
          <div class="asset-row">
            <div class="asset-info">
              <div class="asset-icon green">At</div>
              <div class="asset-details">
                <h4>Airtable</h4>
                <p>Invested $30k</p>
              </div>
            </div>
            <div class="asset-value">
              <div class="amount">$45,000</div>
              <div class="change">+156%</div>
            </div>
          </div>
          
          <div class="asset-row">
            <div class="asset-info">
              <div class="asset-icon purple">St</div>
              <div class="asset-details">
                <h4>Stripe</h4>
                <p>Invested $25k</p>
              </div>
            </div>
            <div class="asset-value">
              <div class="amount">$38,000</div>
              <div class="change">+89%</div>
            </div>
          </div>
          
          <div class="asset-row">
            <div class="asset-info">
              <div class="asset-icon orange">Rp</div>
              <div class="asset-details">
                <h4>Rippling</h4>
                <p>Invested $20k</p>
              </div>
            </div>
            <div class="asset-value">
              <div class="amount">$28,000</div>
              <div class="change">+45%</div>
            </div>
          </div>
        </div>
        
        <!-- Quick Stats (same text-[9px] pattern as other widgets) -->
        <div class="stats-row">
          <div>
            <div class="stat-label">Companies</div>
            <div class="stat-value">12</div>
          </div>
          <div>
            <div class="stat-label">Cash Bal.</div>
            <div class="stat-value">8k DA</div>
          </div>
          <div>
            <div class="stat-label">Committed</div>
            <div class="stat-value">5k DA</div>
          </div>
        </div>
        
      </div>
    </div>
  </div>
  
  <!-- Theme Toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">☀️</span>
  </button>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      html.classList.toggle('dark');
      icon.textContent = html.classList.contains('dark') ? '☀️' : '🌙';
    }
  </script>
</body>
</html>
