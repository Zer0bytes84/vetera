<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/baitari-mark.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baitari</title>
    <script>
    "use strict";
    window.addEventListener("error", (e) => {
      document.body.innerHTML +=
        '<div style="color:red;z-index:9999;position:absolute;top:0;left:0;background:white;padding:20px;">' +
        e.message +
        "<br/>" +
        e.filename +
        ":" +
        e.lineno +
        "</div>";
    });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
